      --bg: #0f1720;

      --border: #2b3949;
      --primary: #34cbb9;
      --primary-dark: #28b2a1;
      --sidebar-bg: linear-gradient(180deg, #15212b 0%, #1c2c38 100%);
      --sidebar-text: rgba(255,255,255,0.94);
      --sidebar-text-muted: rgba(255,255,255,0.68);
      --sidebar-active-bg: rgba(52, 203, 185, 0.16);
      --sidebar-active-text: #6ce3d4;
      --icon-circle: rgba(255,255,255,0.08);
      --card-hero: linear-gradient(135deg, #1c7f78 0%, #2aa99e 100%);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      font-size: 15px;
      line-height: 1.45;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
    width: var(--sidebar-width);
    background: linear-gradient(180deg, #4AD797 0%, #1f2737 100%);
    color: #114D32;
    padding: 16px 12px;
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    transition: width 0.25s ease;
    overflow: hidden;
    z-index: 1000;
    }

    .sidebar.collapsed {
    width: var(--sidebar-collapsed-width);
    }

    .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 18px;
    min-height: 52px;
    }

    .brand-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    overflow: hidden;
    }

    .logo-circle {
    width: 30px;
    height: 30px;
    min-width: 30;
    border-radius: 10px;
    display: grid;
    place-items: center;
    background: rgba(255,255,255,0.16);
    color: #fff;
    font-weight: 700;
    font-size: 0.75rem;
    }

    .brand-name {
    font-size: 1.05rem;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    transition: opacity 0.2s ease, width 0.2s ease;
    }

    .brand-toggle {
    width: 38px;
    height: 38px;
    min-width: 38px;
    border-radius: 12px;
    display: grid;
    place-items: center;
    background: rgba(255,255,255,0.14);
    color: #fff;
    border: 0;
    cursor: pointer;
    transition: all 0.2s ease;
    flex-shrink: 0;
    }

    .brand-toggle:hover {
    background: rgba(255,255,255,0.22);
    }

    /* ตอนย่อ sidebar */
    .sidebar.collapsed .brand {
    justify-content: space-between; 
    align-items: center;
    padding-top: 10px;
    position: relative;
    }

    .sidebar.collapsed .brand-left {
        justify-content: flex-start;  /* ให้ GB อยู่ซ้าย */
        width: auto;
    }

    .sidebar.collapsed .brand-name {
    opacity: 0;
    width: 0;
    overflow: hidden;
    }

    .menu {
    margin-top: 8px;
    }

    .menu-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    }

    .menu-item {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: rgba(255,255,255,0.92);
    padding: 13px 14px;
    border-radius: 18px;
    transition: all 0.2s ease;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    }

    .menu-item:hover {
    background: rgba(255,255,255,0.12);
    }

    .menu-item.active {
    background: #ffffff;
    color: #23a899;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    }

    .menu-icon {
    width: 28px;
    min-width: 28px;
    text-align: center;
    font-size: 1.35rem;
    }

    .menu-text {
    font-size: 0.75rem;
    transition: opacity 0.2s ease, width 0.2s ease;
    }

    .sidebar.collapsed .menu-item {
    justify-content: center;
    padding: 14px 0;
    border-radius: 20px;
    }

    .sidebar.collapsed .menu-text {
    opacity: 0;
    width: 0;
    overflow: hidden;
    }

    .sidebar.collapsed .menu-icon {
    margin: 0;
    }

    /* =========================
       MAIN
    ========================== */
    .main {
      flex: 1;
      margin-left: var(--sidebar-width);
      min-width: 0;
      transition: margin-left 0.25s ease;
    }

    .main.expanded {
      margin-left: var(--sidebar-collapsed-width);
    }

    /* =========================
       NAVBAR
    ========================== */
    .navbar {
      height: var(--navbar-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 28px 14px 36px;
      background: rgba(255,255,255,0.45);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 999;
      backdrop-filter: blur(10px);
    }

    /*.navbar h1 {
      margin-left: 12px;  
    }*/

    .navbar-left {
      display: flex;
      align-items: center;
    }

    .navbar-title {
      margin: 0;
      color: #114D32;
      font-size: 24px;
      font-weight: 700;
    }

    body.dark .navbar-title {
      color: #edf3f8;
    }

    .page-title {
      margin: 0;
      color: #114D32;
      font-size: 16px;
      font-weight: 700;
    }

    body.dark .page-title {
      color: #edf3f8;
    }

    body.dark .navbar {
      background: rgba(24, 34, 45, 0.72);
    }

    .search-wrap {
      flex: 1;
      max-width: 720px;
      position: relative;
    }

    .search-wrap i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
    }

    .search-input {
      width: 100%;
      height: 48px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 0 18px 0 46px;
      font-size: 0.98rem;
      color: var(--text);
      outline: none;
      transition: all 0.2s ease;
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(47, 189, 174, 0.12);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      font-size: 1.2rem;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .badge-dot {
      position: absolute;
      top: -3px;
      right: -2px;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      background: #ff4d57;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      display: grid;
      place-items: center;
      border: 2px solid var(--bg);
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      font-weight: 600;
      color: var(--text);
    }

    /* =========================
       CONTENT
    ========================== */
    .content {
      padding: 28px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.35fr 1fr;
      gap: 22px;
      background: var(--card-hero);
      color: #fff;
      border-radius: 30px;
      padding: 30px;
      box-shadow: var(--shadow);
      align-items: center;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 2.4rem;
      line-height: 1.15;
    }

    .hero p {
      margin: 0 0 24px;
      font-size: 1.08rem;
      opacity: 0.95;
      max-width: 700px;
    }

    .temp-card {
      background: rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 18px;
      max-width: 740px;
    }

    .temp-value {
      font-size: 2.2rem;
      font-weight: 700;
    }

    .temp-info .title {
      font-size: 1rem;
      font-weight: 600;
    }

    .temp-info .sub {
      font-size: 0.96rem;
      opacity: 0.92;
    }

    .hero-image {
      min-height: 280px;
      border-radius: 24px;
      background:
        linear-gradient(rgba(255,255,255,0.18), rgba(255,255,255,0.12)),
        url("https://images.unsplash.com/photo-1558002038-1055907df827?q=80&w=1200&auto=format&fit=crop") center/cover;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 22px;
      margin-top: 22px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .card h3 {
      margin: 0;
      font-size: 1.55rem;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .card-header small {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .room-card {
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      background: var(--surface);
      min-height: 180px;
    }

    .room-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .room-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .room-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--primary);
      color: white;
      font-size: 1.2rem;
    }

    .room-name {
      font-size: 1.05rem;
      font-weight: 700;
    }

    .room-label {
      color: var(--muted);
      margin-bottom: 12px;
    }

    .mini-menu {
      color: var(--muted);
      font-size: 1.25rem;
      cursor: pointer;
    }

    .device-link {
      margin-top: 16px;
      color: var(--primary);
      font-weight: 500;
      display: inline-block;
      text-decoration: none;
    }

    .right-stack {
      display: grid;
      gap: 22px;
    }

    .ac-temp {
      font-size: 3rem;
      font-weight: 700;
      color: var(--primary);
      margin: 8px 0 2px;
      line-height: 1;
    }

    .muted {
      color: var(--muted);
    }

    .range-wrap {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .range-vertical {
      -webkit-appearance: none;
      writing-mode: bt-lr;
      width: 10px;
      height: 120px;
      background: transparent;
    }

    .range-vertical::-webkit-slider-runnable-track {
      width: 10px;
      height: 120px;
      background: var(--surface-2);
      border-radius: 999px;
    }

    .range-vertical::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 42px;
      background: var(--primary);
      border-radius: 999px;
      cursor: pointer;
      margin-top: 0;
    }

    .switch {
      position: relative;
      width: 58px;
      height: 32px;
      display: inline-block;
    }

    .switch input {
      display: none;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #cfd8df;
      border-radius: 999px;
      transition: .25s;
      cursor: pointer;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 26px;
      height: 26px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: #fff;
      transition: .25s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .switch input:checked + .slider {
      background: var(--primary);
    }

    .switch input:checked + .slider::before {
      transform: translateX(26px);
    }

    /* theme dropdown */
    .settings-wrap {
      position: relative;
    }

    .dropdown {
      position: absolute;
      top: 54px;
      right: 0;
      width: 260px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 12px;
      display: none;
      z-index: 1001;
    }

    .dropdown.show {
      display: block;
    }

    .dropdown-title {
      font-weight: 700;
      font-size: 1.25rem;
      margin-bottom: 12px;
    }

    .dropdown-link {
      padding: 12px 10px;
      border-radius: 12px;
      cursor: pointer;
      color: var(--text);
    }

    .dropdown-link:hover {
      background: var(--surface-2);
    }

    .theme-box {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    .theme-selector {
      height: 50px;
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: var(--surface);
      cursor: pointer;
      font-weight: 500;
    }

      font-size: 0.92rem;
    }

    /* page sections for menu */
    .page-section {
      display: none;
    }

    .page-section.active {
      display: block;
    }

    .simple-page {
      min-height: 320px;
    }

    .simple-page .card {
      padding: 34px;
    }

    .simple-page h2 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .simple-page p {
      margin: 0;
      color: var(--muted);
      font-size: 1.02rem;
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .rooms-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      .sidebar {
        width: var(--sidebar-collapsed-width);
      }

      .sidebar .brand-name,
      .sidebar .menu-text,
      .sidebar .section-title {
        opacity: 0;
        pointer-events: none;
        width: 0;
        overflow: hidden;
      }

      .main {
        margin-left: var(--sidebar-collapsed-width);
      }

      .rooms-grid {
        grid-template-columns: 1fr;
      }

      .navbar {
        padding: 12px 16px;
      }

      .content {
        padding: 16px;
      }

      .hero {
        padding: 20px;
      }

      .hero h1 {
        font-size: 1.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-left">
          <div class="logo-circle">GB</div>
          <div class="navbar-left">
            <h1 class="page-title">Greenbook</h1>
          </div>
        </div>
        <button class="brand-toggle" id="sidebarToggle" title="ย่อ/ขยายเมนู">
          <i class="bi bi-chevron-left" id="toggleIcon"></i>
        </button>
      </div>

      <nav class="menu">
        <div class="menu-group">

          <a class="menu-item {% if request.path == '/greenbook/home' %}active{% endif %}" data-page="home"  href="/greenbook/home">
            <span class="menu-icon"><i class="bi bi-house-door"></i></span>
            <span class="menu-text">Home</span>
          </a>

          <a class="menu-item {% if request.path == '/greenbook/predict' %}active{% endif %}" data-page="Prediction"  href="/greenbook/predict">
            <span class="menu-icon"><i class="bi bi-graph-down"></i></span>
            <span class="menu-text">Prediction</span>
          </a>

          <a class="menu-item {% if request.path == '/greenbook/branch-predict' %}active{% endif %}" data-page="Branch_Prediction" href="/greenbook/branch-predict">
            <span class="menu-icon"><i class="bi bi-geo-alt"></i></span>
            <span class="menu-text">Branch Prediction</span>
          </a>

          <a class="menu-item {% if request.path == '/greenbook/seasonal-predict' %}active{% endif %}" data-page="SeasonalPrediction" href="/greenbook/seasonal-predict">
            <span class="menu-icon"><i class="bi bi-calendar-event"></i></span>
            <span class="menu-text">Seasonal Prediction</span>
          </a>
          <!--            
          <a class="menu-item" data-page="security">
            <span class="menu-icon"><i class="bi bi-shield-check"></i></span>
            <span class="menu-text">Security</span>
          </a>

          <a class="menu-item" data-page="devices">
            <span class="menu-icon"><i class="bi bi-phone"></i></span>
            <span class="menu-text">Devices</span>
          </a>

          <a class="menu-item" data-page="profile">
            <span class="menu-icon"><i class="bi bi-person"></i></span>
            <span class="menu-text">Profile</span>
          </a>

          <a class="menu-item" data-page="signin">
            <span class="menu-icon"><i class="bi bi-box-arrow-in-right"></i></span>
            <span class="menu-text">Signin</span>
          </a>
        -->
          <a class="menu-item {% if request.path == '/greenbook/logout' %}active{% endif %}" href="/greenbook/logout">
            <span class="menu-icon"><i class="bi bi-box-arrow-right"></i></span>
            <span class="menu-text">Logout</span>
          </a>
        </div>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main" id="main">
      <header class="navbar">
        <!--<div class="search-wrap">
          <i class="bi bi-search"></i>
          <input
            type="text"
            class="search-input"
            placeholder="Search rooms, devices, or users..."
          />
        </div>
        -->
        <div class = "navbar-title">
          <a> Greenbook</a>
        </div>

        <div class="nav-actions">

          <div class="settings-wrap">
            <button class="icon-btn" id="settingsBtn">
              <i class="bi bi-gear"></i>
            </button>

            <div class="dropdown" id="settingsDropdown">
                <div class="dropdown-title">Settings</div>
                <div class="dropdown-link">Manage users</div>
    
                <div class="theme-box">
                    <div class="theme-selector" id="themeToggleBox">
                        <span>Theme</span>
                        <span id="themeText">Light 
                            <i class="bi bi-brightness-high"></i>
                        </span>
                    </div>
                </div>
            </div>
          </div>

          <div class="avatar">{{first}}{{last}}</div>
        </div>
      </header>
      {% block content %}

      {% endblock %}
    </main>
  </div>

  <script>
    const sidebar = document.getElementById("sidebar");
    const main = document.getElementById("main");
    const sidebarToggle = document.getElementById("sidebarToggle");
    const toggleIcon = document.getElementById("toggleIcon");
    const settingsBtn = document.getElementById("settingsBtn");
    const settingsDropdown = document.getElementById("settingsDropdown");
    const themeToggleBox = document.getElementById("themeToggleBox");
    const themeText = document.getElementById("themeText");
    const tempRange = document.getElementById("tempRange");
    const acTemp = document.getElementById("acTemp");
  
    // Sidebar collapse/expand
    sidebarToggle.addEventListener("click", () => {
        sidebar.classList.toggle("collapsed");
        main.classList.toggle("expanded");

        if (sidebar.classList.contains("collapsed")) {
        toggleIcon.className = "bi bi-chevron-right";
        localStorage.setItem("sidebarCollapsed", "true");
        } else {
        toggleIcon.className = "bi bi-chevron-left";
        localStorage.setItem("sidebarCollapsed", "false");
        }
    });

    // Restore sidebar state
    if (localStorage.getItem("sidebarCollapsed") === "true") {
        sidebar.classList.add("collapsed");
        main.classList.add("expanded");
        toggleIcon.className = "bi bi-chevron-right";
    }

    // Settings dropdown
    settingsBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        settingsDropdown.classList.toggle("show");
    });

    document.addEventListener("click", (e) => {
        if (!settingsDropdown.contains(e.target) && !settingsBtn.contains(e.target)) {
        settingsDropdown.classList.remove("show");
        }
    });

    // Theme toggle light/dark
    function setTheme(theme) {
        if (theme === "dark") {
        document.body.classList.add("dark");
        themeText.innerHTML = 'Dark <i class="bi bi-moon-stars"></i>';
        } else {
        document.body.classList.remove("dark");
        themeText.innerHTML = 'Light <i class="bi bi-brightness-high"></i>';
        }
        localStorage.setItem("theme", theme);
    }

    themeToggleBox.addEventListener("click", () => {
        const isDark = document.body.classList.contains("dark");
        setTheme(isDark ? "light" : "dark");
    });

    const savedTheme = localStorage.getItem("theme") || "light";
    setTheme(savedTheme);

    // Sidebar active tab + show page
    /*function setActivePage(pageName) {
        menuItems.forEach(item => {
        item.classList.toggle("active", item.dataset.page === pageName);
        });

        pages.forEach(page => {
        page.classList.toggle("active", page.id === `page-${pageName}`);
        });

        localStorage.setItem("activePage", pageName);
    }*/
                     
/*
    menuItems.forEach(item => {
        item.addEventListener("click", () => {
        setActivePage(item.dataset.page);
        });
    });*/

  
    // AC temperature
    if (tempRange && acTemp) {
        tempRange.addEventListener("input", () => {
        acTemp.textContent = `${tempRange.value}°C`;
        });
    }
    </script>
</body>
</html>
